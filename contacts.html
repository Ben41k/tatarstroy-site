<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Татарстрой — Контакты</title>
  </head>
  <body>
    <div data-include="components/header.html"></div>

    <nav aria-label="Основное меню">
      <ul>
        <li><a href="index.html">Главная</a></li>
        <li><a href="services.html">Услуги</a></li>
        <li><a href="projects.html">Проекты</a></li>
        <li><a href="about.html">О компании</a></li>
        <li><a href="contacts.html" aria-current="page">Контакты</a></li>
      </ul>
    </nav>

    <main>
      <div class="container">

        <section class="contact">
          <h2 class="contact__title">Форма обратной связи</h2>

          <form id="contactForm" class="contact-form" novalidate>
            <div class="contact-form__grid">
              <label class="contact-form__field">
                <span class="contact-form__label">Имя</span>
                <input
                  class="contact-form__input"
                  id="contactName"
                  name="name"
                  type="text"
                  autocomplete="name"
                  required
                  minlength="2"
                />
                <div
                  class="contact-form__error"
                  id="contactNameError"
                  aria-live="polite"
                ></div>
              </label>

              <label class="contact-form__field">
                <span class="contact-form__label">Телефон</span>
                <input
                  class="contact-form__input"
                  id="contactPhone"
                  name="phone"
                  type="tel"
                  autocomplete="tel"
                  inputmode="tel"
                  required
                />
                <div
                  class="contact-form__error"
                  id="contactPhoneError"
                  aria-live="polite"
                ></div>
              </label>

              <label class="contact-form__field contact-form__field--full">
                <span class="contact-form__label">Сообщение</span>
                <textarea
                  class="contact-form__textarea"
                  id="contactMessage"
                  name="message"
                  rows="5"
                  required
                  minlength="10"
                ></textarea>
                <div
                  class="contact-form__error"
                  id="contactMessageError"
                  aria-live="polite"
                ></div>
              </label>
            </div>

            <div class="contact-form__footer">
              <button class="btn btn--primary" type="submit">Отправить</button>
              <p
                class="contact-form__status"
                id="contactFormStatus"
                role="status"
                aria-live="polite"
              ></p>
            </div>
          </form>
        </section>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="js/main.js"></script>
  </body>
</html>
