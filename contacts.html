<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Татарстрой — Контакты</title>
  </head>
  <body>
    <div data-include="components/header.html"></div>

    <main>
      <div class="container">

        <section class="contact">
          <div class="contact-info" aria-label="Контактная информация">
            <h2 class="contact__title">Контакты</h2>
            <ul class="contact-info__list">
              <li>
                Телефон:
                <a href="tel:+78431234567">+7 (843) 123-45-67</a>
              </li>
              <li>
                Email:
                <a href="mailto:info@tatarstroy.ru">info@tatarstroy.ru</a>
              </li>
              <li>Адрес: г. Казань, ул. Примерная, д. 10</li>
            </ul>
          </div>

          <h2 class="contact__title">Форма обратной связи</h2>

          <form id="contactForm" class="contact-form" novalidate>
            <div class="contact-form__grid">
              <label class="contact-form__field">
                <span class="contact-form__label">Имя</span>
                <input
                  class="contact-form__input"
                  id="contactName"
                  name="name"
                  type="text"
                  autocomplete="name"
                  required
                  minlength="2"
                />
                <div
                  class="contact-form__error"
                  id="contactNameError"
                  aria-live="polite"
                ></div>
              </label>

              <label class="contact-form__field">
                <span class="contact-form__label">Телефон</span>
                <input
                  class="contact-form__input"
                  id="contactPhone"
                  name="phone"
                  type="tel"
                  autocomplete="tel"
                  inputmode="tel"
                  required
                />
                <div
                  class="contact-form__error"
                  id="contactPhoneError"
                  aria-live="polite"
                ></div>
              </label>

              <label class="contact-form__field contact-form__field--full">
                <span class="contact-form__label">Тип услуги</span>
                <select
                  class="contact-form__input"
                  id="contactService"
                  name="service"
                  required
                >
                  <option value="">Выберите услугу</option>
                  <option value="house-building">Строительство домов</option>
                  <option value="apartment-renovation">Ремонт квартир</option>
                  <option value="commercial-construction">
                    Коммерческое строительство
                  </option>
                  <option value="design">Проектирование</option>
                </select>
                <div
                  class="contact-form__error"
                  id="contactServiceError"
                  aria-live="polite"
                ></div>
              </label>

              <label class="contact-form__field contact-form__field--full">
                <span class="contact-form__label">Сообщение</span>
                <textarea
                  class="contact-form__textarea"
                  id="contactMessage"
                  name="message"
                  rows="5"
                  required
                  minlength="10"
                ></textarea>
                <div
                  class="contact-form__error"
                  id="contactMessageError"
                  aria-live="polite"
                ></div>
              </label>
            </div>

            <div class="contact-form__footer">
              <button class="btn btn--primary" type="submit">Отправить</button>
              <p
                class="contact-form__status"
                id="contactFormStatus"
                role="status"
                aria-live="polite"
              ></p>
            </div>
          </form>

          <div class="contact-map">
            <div style="position:relative;overflow:hidden;"><a href="https://yandex.ru/maps/org/korston_tower/1157195150/?utm_medium=mapframe&utm_source=maps" style="color:#eee;font-size:12px;position:absolute;top:0px;">Korston Tower</a><a href="https://yandex.ru/maps/43/kazan/category/shopping_mall/184108083/?utm_medium=mapframe&utm_source=maps" style="color:#eee;font-size:12px;position:absolute;top:14px;">Торговый центр в Казани</a><a href="https://yandex.ru/maps/43/kazan/category/entertainment_center/184106372/?utm_medium=mapframe&utm_source=maps" style="color:#eee;font-size:12px;position:absolute;top:28px;">Развлекательный центр в Казани</a><iframe src="https://yandex.ru/map-widget/v1/?ll=49.149086%2C55.791865&mode=poi&poi%5Bpoint%5D=49.149950%2C55.793726&poi%5Buri%5D=ymapsbm1%3A%2F%2Forg%3Foid%3D1157195150&z=15.21" width="560" height="400" frameborder="1" allowfullscreen="true" style="position:relative;"></iframe></div>
          </div>
        </section>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="js/main.js"></script>
  </body>
</html>
